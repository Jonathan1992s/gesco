<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- Background -->
  <circle cx="240" cy="180" r="150" fill="#f0f7ff"/>

  <!-- Whiteboard / screen -->
  <rect x="100" y="70" width="260" height="170" rx="10" fill="#1a1a2e"/>
  <rect x="106" y="76" width="248" height="158" rx="6" fill="#f8f9fa"/>

  <!-- Board content: chart bars -->
  <rect x="130" y="180" width="24" height="40" rx="3" fill="#1570c4" opacity="0.3"/>
  <rect x="162" y="155" width="24" height="65" rx="3" fill="#1570c4" opacity="0.6"/>
  <rect x="194" y="135" width="24" height="85" rx="3" fill="#1570c4"/>
  <rect x="226" y="148" width="24" height="72" rx="3" fill="#f4c430"/>
  <rect x="258" y="128" width="24" height="92" rx="3" fill="#1570c4"/>
  <rect x="290" y="110" width="24" height="110" rx="3" fill="#1a1a2e" opacity="0.8"/>

  <!-- Board title line -->
  <rect x="128" y="94" width="100" height="8" rx="4" fill="#1570c4"/>
  <rect x="238" y="94" width="60" height="8" rx="4" fill="#ccc"/>

  <!-- Baseline on board -->
  <rect x="120" y="222" width="210" height="3" rx="1" fill="#ccc"/>

  <!-- Stand legs -->
  <rect x="225" y="238" width="30" height="5" rx="2" fill="#1a1a2e"/>
  <line x1="200" y1="242" x2="180" y2="270" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>
  <line x1="280" y1="242" x2="300" y2="270" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>

  <!-- Teacher figure (simple) -->
  <!-- Body -->
  <circle cx="380" cy="170" r="22" fill="#ffb8b8"/>
  <rect x="358" y="195" width="44" height="55" rx="8" fill="#1570c4"/>
  <!-- Arm pointing -->
  <line x1="358" y1="210" x2="324" y2="190" stroke="#1570c4" stroke-width="8" stroke-linecap="round"/>
  <!-- Pointer -->
  <line x1="324" y1="190" x2="310" y2="183" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="362" y="248" width="15" height="30" rx="5" fill="#1a1a2e"/>
  <rect x="382" y="248" width="15" height="30" rx="5" fill="#1a1a2e"/>
  <!-- Hair -->
  <path d="M358 162 Q380 145 402 162 Q400 148 380 142 Q360 148 358 162Z" fill="#2f2e41"/>

  <!-- Certificate ribbon -->
  <rect x="70" y="240" width="90" height="68" rx="8" fill="#fff" stroke="#1570c4" stroke-width="2"/>
  <rect x="70" y="240" width="90" height="18" rx="8" fill="#1570c4"/>
  <rect x="78" y="252" width="74" height="4" rx="2" fill="#fff" opacity="0.5"/>
  <!-- Certificate lines -->
  <rect x="82" y="270" width="66" height="5" rx="2" fill="#ccc"/>
  <rect x="82" y="282" width="55" height="5" rx="2" fill="#ccc"/>
  <rect x="82" y="294" width="60" height="5" rx="2" fill="#ccc"/>
  <!-- Seal -->
  <circle cx="115" cy="322" r="14" fill="#f4c430"/>
  <circle cx="115" cy="322" r="9" fill="#fff"/>
  <polygon points="115,314 117,320 123,320 118,324 120,330 115,326 110,330 112,324 107,320 113,320" fill="#f4c430"/>
  <!-- Ribbon tails -->
  <polygon points="108,308 108,324 115,316" fill="#f4c430"/>
  <polygon points="122,308 122,324 115,316" fill="#f4c430"/>

  <!-- Ministry of Work stamp -->
  <rect x="75" y="243" width="80" height="13" rx="6" fill="#1570c4"/>
  <text x="115" y="253" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="7" font-weight="700">MINTRAB ✓</text>
</svg>
